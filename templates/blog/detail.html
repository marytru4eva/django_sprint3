<!DOCTYPE html> 
<html lang="ru"> 
<head>    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="img/fav/favicon.ico" type="image">
    <link rel="apple-touch-icon" sizes="180x180" href="img/fav/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/fav/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/fav/favicon-16x16.png">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <title>{{ post.location }}. {{ post.pub_date|date:"d E Y" }}</title>
</head>
<body>	   
    <header>
        <nav class="navbar navbar-light" style="background-color: lightskyblue">
            <div class="container">
                <a class="navbar-brand" href="{% url 'index' %}">
                    <img src="img/logo.png" width="30" height="30" class="d-inline-block align-top" alt="">
                    Блогикум
                </a>        
                <ul class="nav nav-pills">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}">Лента записей</a>
                    </li>
                    <li class="nav-item">              
                        <a class="nav-link" href="/pages/about/">О проекте</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pages/rules/">Наши правила</a>
                    </li>
                </ul>      
            </div>
        </nav> 
    </header>
    <main>
        <div class="container py-5">
            <article>
                <ul>
                    <li>Место: {{ post.location }}</li>
                    <li>Дата: {{ post.pub_date|date:"d E Y" }}</li>
                    <li>
                        Категория: 
                        <a href="{% url 'category_posts' post.category.slug %}">
                            {{ post.category.title }}
                        </a>
                    </li>
                </ul>         
                <p>{{ post.text|linebreaks }}</p>          
            </article>                
        </div>
    </main>
    <footer class="border-top text-center py-3">
        <p>© Блогикум</p>    
    </footer>
</body>
</html>
